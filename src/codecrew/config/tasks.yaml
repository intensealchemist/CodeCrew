research_task:
  description: >
    Research and create a detailed technical specification for the following project:
    
    **Task:** {task}
    
    Your specification MUST include:
    1. Project Overview
    2. Tech Stack
    3. Architecture
    4. Project Structure
    5. Core Features
    6. Data Models
    7. API Design
    8. Dependencies
    9. Testing Strategy
    10. Security Considerations
    
    No placeholders allowed.
  expected_output: >
    A comprehensive technical specification document containing all 10 sections.
  agent: researcher

spec_validation_task:
  description: >
    Review the technical specification provided by the researcher.
    Run it through this checklist:
    - Are there any [placeholder] style gaps?
    - Are all 10 required sections actually filled in?
    - Is the tech stack explicit?
    If not, loop back and fill them (write the corrected spec as your output).
  expected_output: >
    The fully validated, corrected, and gap-free technical specification document.
  agent: spec_validator

architecture_task:
  description: >
    Using the validated research specification, create a detailed architectural blueprint
    for the project. Write ARCHITECTURE.md using the File Writer tool.
    Must include:
    1. Architecture Pattern
    2. Folder Structure
    3. Component Diagram
    4. Interface Contracts
    5. Data Flow
    6. Dependency Graph
    7. Design Decisions
    8. Error Handling Strategy
    No placeholders or TODOs allowed.
  expected_output: >
    A comprehensive ARCHITECTURE.md document.
  agent: architect

file_planning_task:
  description: >
    Based on the ARCHITECTURE.md blueprint, produce a strictly ordered list of files to write.
    Order the files such that configuration files and base dependencies come first, 
    followed by core modules, then entry points.
  expected_output: >
    A structured plan detailing the exact order to build the files.
  agent: file_planner

coding_task:
  description: >
    Based on the file plan and the architecture blueprint, build the COMPLETE project.
    
    You MUST:
    1. Write every single file specified in the blueprint.
    2. Write complete, working code — no placeholders, no TODOs.
    3. Implement all interface contracts.
    
    Use the **Execution_Loop** tool to write each file. 
    The Execution_Loop tool lint, test, and retries up to 3 times if it fails.
    Provide the lint_command and test_command arguments to Execution_Loop when possible 
    (e.g., 'python -m py_compile <file>' or 'eslint <file>').
    Feed errors back into your reasoning and fix them.
  expected_output: >
    A complete project with all source files written and verified.
  agent: coder

qa_task:
  description: >
    Adversarially review the entire project built by the coder for {task}.
    1. Check if every file in the spec actually exists.
    2. Check if imports resolve.
    3. Look for hardcoded secrets.
    4. Ensure there is at least one test per major function.
    Use tools to read files, run tests, and fix any missing or buggy implementations.
  expected_output: >
    A final QA report detailing all bugs found and fixed.
  agent: qa_agent

readme_task:
  description: >
    Write accurate setup instructions based on the actual files generated.
    Read the final working codebase and write a comprehensive README.md in the root directory.
    Setup instructions must be accurate to the generated code.
  expected_output: >
    A complete and accurate README.md file written to disk.
  agent: readme_agent
