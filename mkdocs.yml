site_name: CodeCrew Documentation
site_description: Multi-agent software generation platform with CLI, API, and web orchestration.
site_url: https://example.com/codecrew
repo_url: https://github.com/your-org/codecrew
repo_name: codecrew
docs_dir: docs
theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tabs
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
plugins:
  - search
markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
nav:
  - Home: index.md
  - Overview: project-overview.md
  - Architecture: architecture.md
  - API Reference: api-reference.md
  - Setup:
      - Installation: installation.md
      - Configuration: configuration.md
  - Operations:
      - Troubleshooting: troubleshooting.md
      - Contributing: contributing.md
      - Versioning and Release: versioning.md
extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid-init.js
